name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --all-extras
        working-directory: .

      - name: Ruff lint
        run: uv run ruff check .
        working-directory: .

      - name: Ruff format
        run: uv run ruff format --check .
        working-directory: .

      - name: Mypy
        run: uv run mypy app/
        env:
          PYTHONPATH: .

      - name: Pytest
        run: uv run pytest -v
        env:
          PYTHONPATH: .
